[build]
target = "riscv32imc-esp-espidf"

[target.riscv32imc-esp-espidf]
linker = "ldproxy"
runner = "espflash flash --monitor"  # `cargo run` flashes + opens serial monitor
rustflags = ["--cfg", "espidf_time64"]

[unstable]
build-std = ["std", "panic_abort"]

[env]
MCU = "esp32c3"
# ESP-IDF version. v5.2 is a good, well-supported baseline for the ESP32-C3.
ESP_IDF_VERSION = "v5.2.2"
